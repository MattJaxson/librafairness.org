[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "libra-core"
version = "0.1.0"
description = "Shared fairness, governance, and compliance logic for Libra."
requires-python = ">=3.11"
dependencies = [
  "numpy>=1.26.0",
  "pandas>=2.1.0",
  "scikit-learn>=1.3.0",
  "fairlearn>=0.10.0",
  "reportlab>=4.0.0",
]

[tool.setuptools.packages.find]
where = ["src"]
